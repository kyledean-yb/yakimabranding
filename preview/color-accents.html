<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-body);background:var(--bg);padding:26px 30px}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{border-radius:var(--r-sm);height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 9px;color:#fff;box-shadow:var(--sh-sm)}
  .sw b{font-size:12px;font-family:var(--font-display);font-weight:700}
  .sw small{font-size:9.5px;opacity:.85}
</style></head>
<body>
  <div class="grid">
    <div class="sw" style="background:var(--yb-cyan)"><b>Cyan</b><small>SEO · #2BC4F0</small></div>
    <div class="sw" style="background:var(--yb-violet)"><b>Violet</b><small>Brand · #7B5BE6</small></div>
    <div class="sw" style="background:var(--yb-coral)"><b>Coral</b><small>Ads · #FF6B57</small></div>
    <div class="sw" style="background:var(--yb-amber);color:var(--ink)"><b>Amber</b><small>Social · #FFB23E</small></div>
    <div class="sw" style="background:var(--yb-mint)"><b>Mint</b><small>Web · #25C28A</small></div>
    <div class="sw" style="background:var(--yb-pink)"><b>Pink</b><small>Content · #FF5C9D</small></div>
  </div>
</body></html>
