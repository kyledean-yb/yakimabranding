<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-body);background:var(--bg);padding:26px 30px}
  .grid{display:flex;gap:12px}
  .g{flex:1;height:96px;border-radius:var(--r-md);display:flex;align-items:flex-end;padding:9px 11px;box-shadow:var(--sh-sm)}
  .g b{font-size:12px;font-family:var(--font-display);font-weight:700;color:#fff}
</style></head>
<body>
  <div class="grid">
    <div class="g" style="background:var(--grad-brand)"><b>Brand</b></div>
    <div class="g" style="background:var(--grad-violet)"><b>Violet</b></div>
    <div class="g" style="background:var(--grad-sunset)"><b>Sunset</b></div>
    <div class="g" style="background:var(--grad-navy)"><b>Navy</b></div>
    <div class="g" style="background:#fff;border:1px solid var(--line);background-image:var(--grad-mesh)"><b style="color:var(--ink)">Mesh glow</b></div>
  </div>
</body></html>
