<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-body);background:var(--bg);padding:26px 30px}
  .grid{display:flex;gap:10px}
  .sw{flex:1;border-radius:var(--r-sm);height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 9px;box-shadow:var(--sh-xs);border:1px solid var(--line)}
  .sw b{font-size:12px;font-family:var(--font-display);font-weight:700}
  .sw small{font-size:9.5px;opacity:.7}
</style></head>
<body>
  <div class="grid">
    <div class="sw" style="background:var(--ink)"><b style="color:#fff">Ink</b><small style="color:#b8c4de">#16203A · fg1</small></div>
    <div class="sw" style="background:var(--yb-navy-800)"><b style="color:#fff">Navy</b><small style="color:#b8c4de">#22314F</small></div>
    <div class="sw" style="background:var(--fg2)"><b style="color:#fff">fg2</b><small style="color:#dfe5f0">#4A5673</small></div>
    <div class="sw" style="background:var(--bg-soft)"><b style="color:var(--ink)">Soft</b><small>#F6F8FC</small></div>
    <div class="sw" style="background:var(--bg-mute)"><b style="color:var(--ink)">Mute</b><small>#EEF2F9</small></div>
    <div class="sw" style="background:#fff"><b style="color:var(--ink)">White</b><small>#FFFFFF</small></div>
  </div>
</body></html>
