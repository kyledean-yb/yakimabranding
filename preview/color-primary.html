<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-body);background:var(--bg);padding:26px 30px}
  .grid{display:flex;gap:0;border-radius:var(--r-md);overflow:hidden;box-shadow:var(--sh-sm)}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px}
  .sw span{font-size:11px;font-weight:700;font-family:var(--font-display)}
  .sw small{font-size:10px;opacity:.8;display:block}
  .lt{color:#fff} .dk{color:var(--ink)}
</style></head>
<body>
  <div class="grid">
    <div class="sw lt" style="background:var(--yb-blue-100)"><span class="dk">100</span><small style="color:var(--fg3)">#E5ECFB</small></div>
    <div class="sw lt" style="background:var(--yb-blue-300)"><span class="dk">300</span><small style="color:#33405e">#8FAEF0</small></div>
    <div class="sw lt" style="background:var(--yb-blue)"><span>Blue 500</span><small>#3F6FD6</small></div>
    <div class="sw lt" style="background:var(--yb-blue-600)"><span>600</span><small>#2F5AC0</small></div>
    <div class="sw lt" style="background:var(--yb-blue-700)"><span>700</span><small>#244AA3</small></div>
  </div>
</body></html>
