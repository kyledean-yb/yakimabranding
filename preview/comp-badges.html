<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-body);background:var(--bg);padding:26px 30px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:6px;border-radius:var(--r-pill);padding:7px 15px;font-size:13px;font-weight:700;font-family:var(--font-body)}
  .pill svg{width:14px;height:14px}
  .eyebrow-box{display:inline-flex;align-items:center;gap:8px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--yb-coral)}
  .verif{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--fg2);border:1px solid var(--line);border-radius:var(--r-pill);padding:6px 12px;background:#fff}
  .verif svg{width:14px;height:14px;color:var(--yb-mint)}
</style></head>
<body>
  <span class="eyebrow-box"><span class="dot"></span><span class="yb-eyebrow">Why Choose Us</span></span>
  <span class="pill" style="background:var(--wash-blue);color:var(--yb-blue)"><i data-lucide="check"></i> Dedicated Team</span>
  <span class="pill" style="background:var(--wash-mint);color:#159468"><i data-lucide="trending-up"></i> Proven Results</span>
  <span class="pill" style="background:var(--wash-violet);color:var(--yb-violet)">Custom Solutions</span>
  <span class="verif"><i data-lucide="badge-check"></i> Verified by Clutch</span>
  <span class="pill" style="background:var(--yb-navy);color:#fff">$500 OFF</span>
  <script src="https://unpkg.com/lucide@latest"></script><script>lucide.createIcons();</script>
</body></html>
