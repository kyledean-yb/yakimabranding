<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-body);background:var(--bg);padding:28px 30px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .btn{font-family:var(--font-body);font-weight:700;font-size:15px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:8px;border-radius:var(--r-md);padding:13px 22px;transition:all var(--dur) var(--ease)}
  .primary{background:var(--yb-blue);color:#fff;box-shadow:var(--sh-blue)}
  .grad{background:var(--grad-brand);color:#fff;box-shadow:var(--sh-blue)}
  .coral{background:var(--yb-coral);color:#fff;box-shadow:var(--sh-coral)}
  .ghost{background:#fff;color:var(--yb-blue);border:1.5px solid var(--line-strong)}
  .ghost:hover{border-color:var(--yb-blue);background:var(--wash-blue)}
  .navy{background:var(--yb-navy);color:#fff}
  .btn svg{width:17px;height:17px}
</style></head>
<body>
  <button class="btn primary">Get Started <i data-lucide="arrow-right"></i></button>
  <button class="btn grad">Start Your Project</button>
  <button class="btn coral">Book Meeting</button>
  <button class="btn ghost">Learn More</button>
  <button class="btn navy">Contact Us</button>
  <script src="https://unpkg.com/lucide@latest"></script><script>lucide.createIcons();</script>
</body></html>
