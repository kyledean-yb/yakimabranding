<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-body);background:var(--bg-soft);padding:26px 30px;display:flex;gap:16px}
  .card{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);padding:22px;box-shadow:var(--sh-sm);width:300px;border-top:4px solid var(--accent)}
  .chip{width:46px;height:46px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;background:var(--wash);color:var(--accent);margin-bottom:14px}
  .chip svg{width:23px;height:23px}
  h3{margin:0 0 7px}
  p{margin:0;font-size:13.5px}
  .ln{display:inline-flex;align-items:center;gap:5px;color:var(--accent);font-weight:700;font-size:13px;margin-top:14px}
  .ln svg{width:14px;height:14px}
</style></head>
<body>
  <div class="card" style="--accent:var(--yb-cyan);--wash:var(--wash-cyan)">
    <div class="chip"><i data-lucide="search"></i></div>
    <h3 class="yb-h3" style="font-size:20px">SEO &amp; AI Search</h3>
    <p>Put your brand at the top of search results and inside AI-powered results.</p>
    <span class="ln">Learn More <i data-lucide="arrow-right"></i></span>
  </div>
  <div class="card" style="--accent:var(--yb-coral);--wash:var(--wash-coral)">
    <div class="chip"><i data-lucide="target"></i></div>
    <h3 class="yb-h3" style="font-size:20px">Google Ads / PPC</h3>
    <p>Drive immediate traffic and measurable ROI with targeted ad campaigns.</p>
    <span class="ln">Learn More <i data-lucide="arrow-right"></i></span>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script><script>lucide.createIcons();</script>
</body></html>
