<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-body);background:var(--grad-navy);padding:30px;display:flex;gap:30px;justify-content:center}
  .stat{text-align:center}
  .num{font-family:var(--font-display);font-weight:800;font-size:48px;line-height:1;background:var(--grad-brand);-webkit-background-clip:text;background-clip:text;color:transparent}
  .lab{font-size:12px;font-weight:600;color:var(--fg2-on-dark);margin-top:8px;letter-spacing:.04em}
</style></head>
<body>
  <div class="stat"><div class="num">12</div><div class="lab">Years in Business</div></div>
  <div class="stat"><div class="num">40+</div><div class="lab">Industries</div></div>
  <div class="stat"><div class="num">250+</div><div class="lab">Active Clients</div></div>
  <div class="stat"><div class="num">75+</div><div class="lab">Years Experience</div></div>
</body></html>
