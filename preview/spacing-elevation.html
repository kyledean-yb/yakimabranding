<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-body);background:var(--bg-soft);padding:30px}
  .grid{display:flex;gap:20px;align-items:center;justify-content:center}
  .card{width:104px;height:84px;background:#fff;border-radius:var(--r-md);display:flex;align-items:flex-end;justify-content:center;padding-bottom:9px}
  .card span{font-size:11px;color:var(--fg3);font-weight:700}
  .e1{box-shadow:var(--sh-xs)} .e2{box-shadow:var(--sh-sm)} .e3{box-shadow:var(--sh-md)}
  .e4{box-shadow:var(--sh-lg)} .e5{box-shadow:var(--sh-blue)}
</style></head>
<body>
  <div class="grid">
    <div class="card e1"><span>xs</span></div>
    <div class="card e2"><span>sm</span></div>
    <div class="card e3"><span>md</span></div>
    <div class="card e4"><span>lg</span></div>
    <div class="card e5"><span>blue</span></div>
  </div>
</body></html>
