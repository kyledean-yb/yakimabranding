<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-body);background:var(--bg);padding:26px 30px}
  .row{display:flex;align-items:center;gap:10px;margin-bottom:11px}
  .bar{height:18px;background:var(--grad-brand);border-radius:4px}
  .tok{font-size:11px;color:var(--fg3);font-weight:700;width:74px;font-family:var(--font-display)}
</style></head>
<body>
  <div class="row"><span class="tok">s-2 · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="tok">s-4 · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="tok">s-5 · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="tok">s-6 · 32</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="tok">s-7 · 48</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="tok">s-8 · 64</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="tok">s-9 · 96</span><div class="bar" style="width:96px"></div></div>
</body></html>
