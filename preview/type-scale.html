<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-body);background:var(--bg);padding:24px 30px;color:var(--ink)}
  table{border-collapse:collapse;width:100%;max-width:620px}
  td{padding:7px 0;border-bottom:1px solid var(--line);vertical-align:baseline}
  .nm{font-weight:700;font-family:var(--font-display);width:120px;color:var(--ink)}
  .px{font-size:12px;color:var(--fg3);width:140px}
  .ey{margin-bottom:14px}
</style></head>
<body>
  <div class="ey"><span class="yb-eyebrow">What YB Offers — Eyebrow / Kicker</span></div>
  <table>
    <tr><td class="nm">Display</td><td class="px">clamp 44–76px / 800</td><td style="font-family:var(--font-display);font-weight:800;font-size:26px">Aa</td></tr>
    <tr><td class="nm">H1</td><td class="px">clamp 36–56px / 700</td><td style="font-family:var(--font-display);font-weight:700;font-size:23px">Aa</td></tr>
    <tr><td class="nm">H2</td><td class="px">clamp 28–40px / 700</td><td style="font-family:var(--font-display);font-weight:700;font-size:20px">Aa</td></tr>
    <tr><td class="nm">H3</td><td class="px">21–26px / 600</td><td style="font-family:var(--font-display);font-weight:600;font-size:18px">Aa</td></tr>
    <tr><td class="nm">Body</td><td class="px">16px / 400 / 1.65</td><td style="font-size:16px">Aa</td></tr>
  </table>
</body></html>
